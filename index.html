<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Client Interaction Management System</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
  /* ─── Reset & Base ─────────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    --font-mono: "SFMono-Regular", Consolas, monospace;
    --color-bg:           #ffffff;
    --color-bg2:          #f7f7f5;
    --color-bg3:          #f0efe9;
    --color-bg-info:      #E6F1FB;
    --color-bg-success:   #EAF3DE;
    --color-bg-warning:   #FAEEDA;
    --color-bg-danger:    #FCEBEB;
    --color-text:         #1a1a18;
    --color-text2:        #73726c;
    --color-text3:        #a09f99;
    --color-text-info:    #0C447C;
    --color-text-success: #27500A;
    --color-text-warning: #633806;
    --color-text-danger:  #791F1F;
    --color-border:       rgba(0,0,0,0.10);
    --color-border2:      rgba(0,0,0,0.18);
    --radius-sm: 6px;
    --radius-md: 8px;
    --radius-lg: 12px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --color-bg:           #1c1c1a;
      --color-bg2:          #242422;
      --color-bg3:          #2c2c2a;
      --color-bg-info:      #042C53;
      --color-bg-success:   #173404;
      --color-bg-warning:   #412402;
      --color-bg-danger:    #501313;
      --color-text:         #e8e6de;
      --color-text2:        #9c9a92;
      --color-text3:        #6a6862;
      --color-text-info:    #85B7EB;
      --color-text-success: #97C459;
      --color-text-warning: #EF9F27;
      --color-text-danger:  #F09595;
      --color-border:       rgba(255,255,255,0.10);
      --color-border2:      rgba(255,255,255,0.18);
    }
  }
  body {
    font-family: var(--font-sans);
    background: var(--color-bg3);
    color: var(--color-text);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.5;
  }
  #root { max-width: 900px; margin: 0 auto; background: var(--color-bg); min-height: 100vh; }

  /* ─── Layout ────────────────────────────────────────────────────── */
  .app { padding-bottom: 3rem; }
  .topbar { display: flex; align-items: center; justify-content: space-between; padding: .75rem 1.25rem; border-bottom: .5px solid var(--color-border); margin-bottom: 1rem; gap: 8px; flex-wrap: wrap; }
  .topbar-title { font-size: 15px; font-weight: 500; }
  .topbar-sub { font-size: 12px; color: var(--color-text2); }
  .topbar-actions { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
  .tabs { display: flex; gap: 4px; padding: 0 1.25rem; margin-bottom: 1.25rem; flex-wrap: wrap; }
  .section { padding: 0 1.25rem; }

  /* ─── Cards ─────────────────────────────────────────────────────── */
  .card { background: var(--color-bg); border: .5px solid var(--color-border); border-radius: var(--radius-lg); overflow: hidden; margin-bottom: 1rem; }
  .card-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; border-bottom: .5px solid var(--color-border); flex-wrap: wrap; gap: 6px; }
  .card-title { font-size: 13px; font-weight: 500; }
  .card-count { font-size: 12px; color: var(--color-text2); }

  /* ─── Metric Cards ───────────────────────────────────────────────── */
  .metrics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 1rem; }
  .metric-card { background: var(--color-bg2); border-radius: var(--radius-md); padding: 12px 14px; }
  .metric-label { font-size: 11px; color: var(--color-text2); margin-bottom: 5px; }
  .metric-value { font-size: 21px; font-weight: 500; line-height: 1; }
  .metric-sub { font-size: 11px; color: var(--color-text3); margin-top: 4px; }
  .progress-bar { height: 5px; background: var(--color-bg3); border-radius: 3px; overflow: hidden; margin-top: 7px; }
  .progress-fill { height: 100%; border-radius: 3px; }

  /* ─── Tabs ───────────────────────────────────────────────────────── */
  .tab { padding: 6px 13px; border-radius: var(--radius-md); border: .5px solid transparent; font-size: 13px; cursor: pointer; background: transparent; color: var(--color-text2); transition: all .15s; }
  .tab.active { background: var(--color-bg2); border-color: var(--color-border2); color: var(--color-text); font-weight: 500; }
  .tab:hover:not(.active) { background: var(--color-bg2); color: var(--color-text); }

  /* ─── Buttons ────────────────────────────────────────────────────── */
  .btn { padding: 5px 11px; border-radius: var(--radius-md); border: .5px solid var(--color-border2); background: transparent; font-size: 12px; cursor: pointer; color: var(--color-text); transition: all .15s; white-space: nowrap; font-family: var(--font-sans); }
  .btn:hover { background: var(--color-bg2); }
  .btn:disabled { opacity: .4; cursor: default; }
  .btn-primary { background: var(--color-bg-info); color: var(--color-text-info); border-color: transparent; }
  .btn-primary:hover { opacity: .85; }
  .btn-sm { padding: 3px 8px; font-size: 11px; }
  .btn-danger { background: var(--color-bg-danger); color: var(--color-text-danger); border-color: transparent; }

  /* ─── Segmented Control ──────────────────────────────────────────── */
  .seg { display: flex; gap: 2px; background: var(--color-bg2); border-radius: var(--radius-md); padding: 2px; }
  .seg-btn { padding: 4px 9px; border-radius: 6px; border: none; font-size: 11px; cursor: pointer; background: transparent; color: var(--color-text2); transition: all .15s; font-family: var(--font-sans); }
  .seg-btn.active { background: var(--color-bg); color: var(--color-text); font-weight: 500; border: .5px solid var(--color-border); }

  /* ─── Forms ──────────────────────────────────────────────────────── */
  input, select, textarea {
    background: var(--color-bg); border: .5px solid var(--color-border2);
    border-radius: var(--radius-md); padding: 7px 10px; font-size: 13px;
    color: var(--color-text); width: 100%; font-family: var(--font-sans);
    outline: none; transition: border-color .15s;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--color-text3); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .form-field { display: flex; flex-direction: column; gap: 4px; margin-bottom: 10px; }
  .form-label { font-size: 11px; font-weight: 500; color: var(--color-text2); text-transform: uppercase; letter-spacing: .04em; }

  /* ─── Table ──────────────────────────────────────────────────────── */
  table { width: 100%; border-collapse: collapse; font-size: 13px; table-layout: fixed; }
  th { text-align: left; font-size: 11px; font-weight: 500; color: var(--color-text2); padding: 8px 10px; border-bottom: .5px solid var(--color-border); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer; user-select: none; }
  th:hover { color: var(--color-text); }
  td { padding: 8px 10px; border-bottom: .5px solid var(--color-border); vertical-align: middle; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--color-bg2); }

  /* ─── Badges ─────────────────────────────────────────────────────── */
  .badge { display: inline-flex; align-items: center; padding: 2px 7px; border-radius: 20px; font-size: 11px; font-weight: 500; }
  .badge-warn    { background: var(--color-bg-warning); color: var(--color-text-warning); }
  .badge-danger  { background: var(--color-bg-danger);  color: var(--color-text-danger); }
  .badge-success { background: var(--color-bg-success); color: var(--color-text-success); }
  .badge-info    { background: var(--color-bg-info);    color: var(--color-text-info); }

  /* ─── User / Avatar ──────────────────────────────────────────────── */
  .avatar    { width: 22px; height: 22px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 9px;  font-weight: 500; flex-shrink: 0; }
  .avatar-lg { width: 36px; height: 36px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 500; flex-shrink: 0; }
  .team-pill { display: inline-flex; align-items: center; gap: 4px; background: var(--color-bg2); border-radius: 20px; padding: 2px 8px; font-size: 11px; color: var(--color-text2); }
  .user-chip { display: flex; align-items: center; gap: 6px; padding: 4px 10px 4px 4px; border: .5px solid var(--color-border2); border-radius: 20px; font-size: 12px; cursor: pointer; background: var(--color-bg2); }
  .user-chip:hover { background: var(--color-bg3); }
  .role-badge { display: inline-flex; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 500; }
  .role-admin   { background: #EEEDFE; color: #3C3489; }
  .role-manager { background: #E1F5EE; color: #085041; }
  .role-rep     { background: #FAEEDA; color: #633806; }
  .role-viewer  { background: #F1EFE8; color: #444441; }
  .nav-pill { display: flex; align-items: center; gap: 4px; padding: 3px 8px; border-radius: var(--radius-md); background: var(--color-bg-info); color: var(--color-text-info); font-size: 11px; font-weight: 500; }

  /* ─── Misc ───────────────────────────────────────────────────────── */
  .perm-check { width: 14px; height: 14px; border-radius: 3px; display: inline-flex; align-items: center; justify-content: center; font-size: 9px; flex-shrink: 0; }
  .perm-on  { background: var(--color-bg-success); color: var(--color-text-success); }
  .perm-off { background: var(--color-bg2); color: var(--color-text3); border: .5px solid var(--color-border); }
  .urgency-row { display: flex; align-items: center; justify-content: space-between; padding: 9px 14px; border-bottom: .5px solid var(--color-border); }
  .urgency-row:last-child { border-bottom: none; }
  .urgency-row:hover { background: var(--color-bg2); }
  .log-entry { padding: 8px 12px; border-bottom: .5px solid var(--color-border); font-size: 12px; }
  .log-entry:last-child { border-bottom: none; }
  .empty-state { padding: 2rem; text-align: center; color: var(--color-text3); font-size: 13px; }
  .search-bar { position: relative; margin-bottom: 1rem; }
  .search-bar input { padding-left: 28px; }
  .search-icon { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); color: var(--color-text3); font-size: 12px; pointer-events: none; }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
  .field-row { display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: .5px solid var(--color-border); }
  .field-row:last-child { border-bottom: none; }
  .csv-drop { border: 1px dashed var(--color-border2); border-radius: var(--radius-md); padding: 1.25rem; text-align: center; color: var(--color-text2); font-size: 13px; cursor: pointer; transition: background .15s; }
  .csv-drop:hover { background: var(--color-bg2); }
  .chart-type-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; padding: 10px 14px; }
  .chart-type-btn { padding: 8px 4px; border-radius: var(--radius-md); border: .5px solid var(--color-border); background: transparent; cursor: pointer; text-align: center; font-size: 11px; color: var(--color-text2); transition: all .15s; display: flex; flex-direction: column; align-items: center; gap: 4px; font-family: var(--font-sans); }
  .chart-type-btn:hover { background: var(--color-bg2); }
  .chart-type-btn.active { background: var(--color-bg-info); color: var(--color-text-info); border-color: transparent; font-weight: 500; }
  .chart-icon { font-size: 18px; line-height: 1; }
  .user-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; border-bottom: .5px solid var(--color-border); }
  .user-row:last-child { border-bottom: none; }
  .user-row:hover { background: var(--color-bg2); }
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.5); display: flex; align-items: center; justify-content: center; z-index: 100; }
  .modal { background: var(--color-bg); border: .5px solid var(--color-border); border-radius: var(--radius-lg); padding: 1.25rem; width: 500px; max-width: 96vw; max-height: 90vh; overflow-y: auto; }
  .modal-title { font-size: 15px; font-weight: 500; margin-bottom: 1rem; }
  .modal-footer { display: flex; justify-content: flex-end; gap: 8px; margin-top: 1rem; padding-top: 10px; border-top: .5px solid var(--color-border); }
</style>
</head>
<body>
<div id="root"></div>
<script>
const {useState,useMemo,useEffect,useRef}=React;
const h=React.createElement;

/* ── Constants ─────────────────────────────────────────────────────── */
const ROLES={
  admin:  {label:'Admin',   perms:{view:true,log:true,addAccount:true,import:true,manageUsers:true,exportData:true,manageSchema:true}},
  manager:{label:'Manager', perms:{view:true,log:true,addAccount:true,import:true,manageUsers:false,exportData:true,manageSchema:false}},
  rep:    {label:'Rep',     perms:{view:true,log:true,addAccount:false,import:false,manageUsers:false,exportData:false,manageSchema:false}},
  viewer: {label:'Viewer',  perms:{view:true,log:false,addAccount:false,import:false,manageUsers:false,exportData:false,manageSchema:false}},
};
const ROLE_PERMS_LABELS=[['view','View accounts'],['log','Log calls'],['addAccount','Add accounts'],['import','Import CSV'],['manageUsers','Manage users'],['exportData','Export data'],['manageSchema','Manage fields']];
const TEAM_COLORS=[{color:'#185FA5',bg:'#E6F1FB'},{color:'#0F6E56',bg:'#E1F5EE'},{color:'#993C1D',bg:'#FAECE7'},{color:'#993556',bg:'#FBEAF0'},{color:'#854F0B',bg:'#FAEEDA'},{color:'#534AB7',bg:'#EEEDFE'}];
const SECTORS=['Retail','F&B','Finance','Healthcare','Logistics','Tech','Education','Real Estate'];
const BRANDS=[['Al Futtaim Group','ACE Hardware'],['Alshaya Group','Starbucks ME'],['Majid Al Futtaim','Mall of the Emirates'],['Jarir Bookstore','Jarir'],['Extra Stores','Extra'],['Nahdi Medical','Nahdi'],['Tamimi Markets','Tamimi'],['Abdul Latif Jameel','ALJ Auto'],['Gulf Union Foods','Sunbulah'],['Sadafco','Saudia Dairy'],['National Water Company','NWC'],['Saudi Airlines Catering','SAC'],['Binzagr Company','Binzagr'],['Leejam Sports','Fitness Time'],['BinDawood Holding','Danube'],['United Electronics','eXtra'],['Cenomi Retail','Cenomi'],['Arabian Food Industries','Domty'],['SASCO','SASCO Energy'],['Nana Direct','Nana']];
const CHART_TYPES=[{id:'bar',label:'Bar',icon:'▬'},{id:'line',label:'Line',icon:'╱'},{id:'area',label:'Area',icon:'◭'},{id:'horizontalBar',label:'H. Bar',icon:'▭'},{id:'pie',label:'Pie',icon:'◕'},{id:'doughnut',label:'Donut',icon:'◎'},{id:'radar',label:'Radar',icon:'✦'},{id:'scatter',label:'Scatter',icon:'⁙'}];
const INIT_CALL_STATUSES=[{id:'cs1',label:'Completed',color:'#1D9E75'},{id:'cs2',label:'No Answer',color:'#BA7517'},{id:'cs3',label:'Follow-up Required',color:'#185FA5'},{id:'cs4',label:'Meeting Scheduled',color:'#534AB7'},{id:'cs5',label:'Not Interested',color:'#A32D2D'},{id:'cs6',label:'Voicemail Left',color:'#5F5E5A'}];
const INIT_ACCOUNT_EXTRA_FIELDS=[{id:'ef1',label:'Region',type:'text',entity:'account'},{id:'ef2',label:'Priority',type:'select',options:['High','Medium','Low'],entity:'account'}];
const INIT_USER_EXTRA_FIELDS=[{id:'uf1',label:'Phone',type:'text',entity:'user'},{id:'uf2',label:'Territory',type:'text',entity:'user'}];
const INIT_CALL_EXTRA_FIELDS=[{id:'cf1',label:'Deal Size',type:'text',entity:'call'},{id:'cf2',label:'Next Step',type:'text',entity:'call'}];
const INIT_USERS=[{id:'u1',name:'Ahmed Al-Harbi',role:'admin',email:'ahmed@corp.com',...TEAM_COLORS[0]},{id:'u2',name:'Sara Al-Zahrani',role:'manager',email:'sara@corp.com',...TEAM_COLORS[1]},{id:'u3',name:'Mohammed Al-Ghamdi',role:'rep',email:'mohammed@corp.com',...TEAM_COLORS[2]},{id:'u4',name:'Fatima Al-Otaibi',role:'rep',email:'fatima@corp.com',...TEAM_COLORS[3]},{id:'u5',name:'Khalid Al-Qahtani',role:'viewer',email:'khalid@corp.com',...TEAM_COLORS[4]}];

/* ── Helpers ───────────────────────────────────────────────────────── */
function rndDate(n){const d=new Date();d.setDate(d.getDate()-Math.floor(Math.random()*n));return d.toISOString().split('T')[0];}
function daysSince(ds){return Math.floor((new Date()-new Date(ds))/864e5);}
function initials(name){return name.split(' ').slice(0,2).map(w=>w[0]).join('');}
function genMockNotes(users,statuses){const notes=[];const now=new Date();for(let i=89;i>=0;i--){const d=new Date(now);d.setDate(d.getDate()-i);const ds=d.toISOString().split('T')[0];const cnt=Math.floor(Math.random()*4);for(let j=0;j<cnt;j++){notes.push({date:ds,text:'Follow-up call.',memberId:users[Math.floor(Math.random()*users.length)].id,statusId:statuses[Math.floor(Math.random()*statuses.length)].id,extraFields:{cf1:'',cf2:''}});}}return notes;}
function genMock(users,statuses){const pool=genMockNotes(users,statuses);return BRANDS.map(([name,brand],i)=>{const myNotes=pool.filter((_,idx)=>idx%BRANDS.length===i).slice(0,3);return{id:`ACC-${String(i+1).padStart(4,'0')}`,accountName:name,brandName:brand,branches:Math.floor(Math.random()*120)+3,sector:SECTORS[i%SECTORS.length],lastCallDate:myNotes.length?myNotes[0].date:rndDate(45),contactPerson:`${['Ahmed','Sara','Mohammed','Fatima','Khalid'][i%5]} ${['Al-Harbi','Al-Zahrani','Al-Ghamdi','Al-Otaibi','Al-Qahtani'][i%5]}`,notes:myNotes,extraFields:{ef1:'',ef2:'Medium'}};});}

/* ── Shared Components ─────────────────────────────────────────────── */
function urgencyBadge(days){if(days>30)return h('span',{className:'badge badge-danger'},days+'d');if(days>14)return h('span',{className:'badge badge-warn'},days+'d');return h('span',{className:'badge badge-success'},days+'d');}
function UserPill({userId,users}){const u=users.find(x=>x.id===userId);if(!u)return null;return h('span',{className:'team-pill'},h('span',{className:'avatar',style:{background:u.bg,color:u.color}},initials(u.name)),u.name.split(' ')[0]);}
function RoleBadge({role}){return h('span',{className:'role-badge role-'+role},ROLES[role]?.label||role);}
function StatusBadge({statusId,statuses}){const s=statuses.find(x=>x.id===statusId);if(!s)return null;return h('span',{style:{display:'inline-flex',alignItems:'center',gap:4,fontSize:11,fontWeight:500}},h('span',{className:'status-dot',style:{background:s.color}}),s.label);}

/* ── Chart Component ───────────────────────────────────────────────── */
function CallsChart({allLogs,users,isRep,activeUserId}){
  const canvasRef=useRef(null);const chartRef=useRef(null);
  const [granularity,setGranularity]=useState('weekly');
  const [rangeOffset,setRangeOffset]=useState(0);
  const [chartType,setChartType]=useState('bar');
  const [showTypePanel,setShowTypePanel]=useState(false);
  const visibleUsers=isRep?users.filter(u=>u.id===activeUserId):users;
  const RANGE_SIZE={daily:14,weekly:8,monthly:12,yearly:3};

  const {labels,datasets,rangeLabel}=useMemo(()=>{
    const now=new Date();const size=RANGE_SIZE[granularity];
    const logsToUse=isRep?allLogs.filter(l=>l.memberId===activeUserId):allLogs;
    function makeDaily(){const days=[];for(let i=(size-1+rangeOffset*size);i>=(rangeOffset*size);i--){const d=new Date(now);d.setDate(d.getDate()-i);days.push(d.toISOString().split('T')[0]);}const labels=days.map(d=>{const dt=new Date(d);return `${dt.getDate()}/${dt.getMonth()+1}`;});const datasets=visibleUsers.map(u=>({label:u.name.split(' ')[0],data:days.map(day=>logsToUse.filter(l=>l.date===day&&l.memberId===u.id).length),backgroundColor:u.bg,borderColor:u.color,borderWidth:1.5,borderRadius:3,fill:chartType==='area',tension:.35,pointRadius:2}));const fmt=d=>{const dt=new Date(d);return `${dt.getDate()} ${dt.toLocaleString('en',{month:'short'})}`;};return{labels,datasets,rangeLabel:`${fmt(days[0])} – ${fmt(days[days.length-1])}`};}
    function makeWeekly(){const weeks=[];for(let i=(size-1+rangeOffset*size);i>=(rangeOffset*size);i--){const d=new Date(now);d.setDate(d.getDate()-i*7);const day=d.getDay(),diff=d.getDate()-day+(day===0?-6:1);const mon=new Date(d);mon.setDate(diff);weeks.push(mon.toISOString().split('T')[0]);}function weekOf(ds){const d=new Date(ds);const day=d.getDay(),diff=d.getDate()-day+(day===0?-6:1);const m=new Date(d);m.setDate(diff);return m.toISOString().split('T')[0];}const labels=weeks.map(w=>{const d=new Date(w);return `${d.toLocaleString('en',{month:'short'})} ${d.getDate()}`;});const datasets=visibleUsers.map(u=>({label:u.name.split(' ')[0],data:weeks.map(wk=>logsToUse.filter(l=>weekOf(l.date)===wk&&l.memberId===u.id).length),backgroundColor:u.bg,borderColor:u.color,borderWidth:1.5,borderRadius:3,fill:chartType==='area',tension:.35,pointRadius:2}));const fmt=w=>{const d=new Date(w);return `${d.toLocaleString('en',{month:'short'})} ${d.getDate()}`;};return{labels,datasets,rangeLabel:`${fmt(weeks[0])} – ${fmt(weeks[weeks.length-1])}`};}
